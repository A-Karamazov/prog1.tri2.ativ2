<!DOCTYPE html>
<html lang='en'>

<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Page Title</title>
    
    <link rel='stylesheet' href='main.css'>
    <style>
        * {
    box-sizing: border-box;
}

body {
    display: flex;
    height: 100vh;
    > * {
        flex-grow: 1;
        border: 2px solid black
    }
}


    </style>
</head>
<body>
    <div class="request">
        <h2>Request</h2>
        <div>
            <input type="text" id="request-url" placeholder="URI/URL">
            <select name="" id="request-method">
                <option>CET</option>
                <option>POST</option>
                <option>PUT</option>
                <option>DELETE</option>
            </select>
        </div>
        <div>
            <label for="request-header">Cabeçalhos</label>
            <textarea id="request-header"></textarea>
        </div>
        <div>
             <label for="request-body">Corpo</label>
            <textarea id="request-body"></textarea>
        </div>
        <div>
            <button>Enviar</button>
        </div>
    </div>

    <div class="response">
        <h2>Response</h2>
        <div>
            <span id="response-path">caminho</span>
            <span id="response-status-text">status text</span>
            <span id="response-status-code">###</span>
        </div>
        <div>
            <label>Cabeçalhos</label>
            <textarea id="response-header"></textarea>
        </div>
        <div>
             <label>Corpo</label>
            <textarea id="response-body"></textarea>
        </div>
    </div>
    <div>
        <input name="url">
        <select name="method">
            <option>GET</option>
            <option>POST</option>
            <option>PUT</option>
            <option>DELETE</option>
        </select>
        <textarea name="body"></textarea>
        <button id="excecute">Executar</button>
    </div>
    <pre id="status-code">000</pre>
    <pre id="status-text">nnnn</pre>
    <pre id="response-headers">headers</pre>
    <pre id="result">resultado aqui</pre>
    <script>
        // Elementos DOM para Request
        const requestUrl = document.querySelector("#request-url")
        const requestMethod = document.querySelector("#request-method")
        const requestHeader = document.querySelector("#request-header")
        const requestBody = document.querySelector("#request-body")
        const btRequest = document.querySelector("#bt-request")
        // Elementos DOM para Response
        const responsePath = document.querySelector("#response-path")
        const responseStatusText = document.querySelector("#response-status-text")
        const responseStatusCode = document.querySelector("#response-status-code")
        const responseHeader = document.querySelector("#response-header")
        const responseBody = document.querySelector("#response-body")

        btRequest.addEventListener('click', async () => {
            const response = await fetch(requestUrl.value, {
                method: requestMethod.value, 
                headers: requestHeader.value.trim() === '' ? undefined : JSON.parse(requestHeader.value),
                body: requestBody.value.trim() === '' ? undefined : JSON.parse(requestBody.value),
            })

            responseStatusText.innerText = response.statusText
            responseStatusCode.innerText = response.status
            responseHeader.innerText = ''
            responseBody.innerText = await response.text()
            

        })
    </script>

</body>
</html>
